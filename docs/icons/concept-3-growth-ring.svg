    <path d="M512 288a224 224 0 0 1 182 94l-58 40a152 152 0 0 0-124-62z" fill="#d7efe6"/>
    <rect x="386" y="544" width="74" height="148" rx="37" fill="url(#bars)"/>
    <rect x="475" y="472" width="74" height="220" rx="37" fill="url(#bars)"/>
    <rect x="564" y="396" width="74" height="296" rx="37" fill="url(#bars)"/>
    <circle cx="512" cy="512" r="18" fill="#204f61"/>
    <path d="M512 512V392" stroke="#204f61" stroke-width="28" stroke-linecap="round"/>
    <path d="M512 512l86 4" stroke="#204f61" stroke-width="28" stroke-linecap="round"/>
    <circle cx="678" cy="322" r="28" fill="#f2a340"/>
  </g>
