<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Overtime Calculator Icon Concept 3</title>
  <desc id="desc">A mint app icon with a circular time ring and rising rounded bars representing growing overtime pay.</desc>
  <defs>
    <linearGradient id="bg" x1="136" y1="132" x2="872" y2="896" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#eefbf5"/>
      <stop offset="1" stop-color="#b9ead8"/>
    </linearGradient>
    <linearGradient id="ring" x1="290" y1="256" x2="742" y2="756" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3e7c7a"/>
      <stop offset="1" stop-color="#1e4f61"/>
    </linearGradient>
    <linearGradient id="bars" x1="392" y1="456" x2="636" y2="744" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffca72"/>
      <stop offset="1" stop-color="#f08c3a"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#285166" flood-opacity="0.16"/>
    </filter>
  </defs>
  <rect x="64" y="64" width="896" height="896" rx="248" fill="url(#bg)"/>
  <g filter="url(#shadow)">
    <circle cx="512" cy="512" r="286" fill="#f8fffc"/>
