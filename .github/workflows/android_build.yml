name: Android CI/CD

on:
  push:
    tags:
      - 'v*' # 当你推送以 v 开头的标签（如 v1.0）时触发打包
  workflow_dispatch: # 允许你手动点击按钮触发打包

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 从 Secrets 中恢复签名文件
      - name: Decode Keystore
        run: |
          echo "${{ secrets.SIGNING_KEY }}" | base64 --decode > app/release.jks

      # 执行编译打包
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          # 将 Secrets 注入环境变量供 Gradle 读取
          RELEASE_STORE_FILE: release.jks
          RELEASE_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      # 上传生成的 APK 作为附件
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OvertimeCalculator-Release
          path: app/build/outputs/apk/release/*.apk

      # (可选) 自动创建一个 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: app/build/outputs/apk/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
