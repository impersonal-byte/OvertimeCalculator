name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Decode signing keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$GITHUB_WORKSPACE/release-signing.jks"

      - name: Generate local.properties for CI signing
        shell: bash
        run: |
          cat <<EOF > local.properties
          sdk.dir=$ANDROID_HOME
          signing.storeFile=$GITHUB_WORKSPACE/release-signing.jks
          signing.keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          signing.storePassword=${{ secrets.ANDROID_STORE_PASSWORD }}
          signing.keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          EOF

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Validate tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(./gradlew -q printVersionName)"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match appVersionName $APP_VERSION"
            exit 1
          fi

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew --no-daemon packageReleaseApk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk-${{ github.ref_name }}
          path: app/build/dist/*.apk
          if-no-files-found: error

      - name: Select release notes source
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "body_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "generate_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
            echo "generate_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: app/build/dist/*.apk
          body_path: ${{ steps.release_notes.outputs.body_path }}
          generate_release_notes: ${{ steps.release_notes.outputs.generate_notes }}
