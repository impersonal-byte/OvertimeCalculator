name: Android Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEY }}
      SIGNING_KEY_ALIAS: ${{ secrets.ALIAS }}
      SIGNING_STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
      SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Validate signing secrets
        shell: bash
        run: |
          missing=0
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "Missing secret: SIGNING_KEY"
            missing=1
          fi
          if [ -z "$SIGNING_KEY_ALIAS" ]; then
            echo "Missing secret: ALIAS"
            missing=1
          fi
          if [ -z "$SIGNING_STORE_PASSWORD" ]; then
            echo "Missing secret: KEY_STORE_PASSWORD"
            missing=1
          fi
          if [ -z "$SIGNING_KEY_PASSWORD" ]; then
            echo "Missing secret: KEY_PASSWORD"
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Decode signing keystore
        shell: bash
        run: |
          echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release-signing.jks"
          test -s "$GITHUB_WORKSPACE/release-signing.jks"

      - name: Generate local.properties for CI signing
        shell: bash
        run: |
          SDK_DIR="${ANDROID_SDK_ROOT:-$ANDROID_HOME}"
          cat <<EOF > local.properties
          sdk.dir=$SDK_DIR
          signing.storeFile=$GITHUB_WORKSPACE/release-signing.jks
          signing.keyAlias=$SIGNING_KEY_ALIAS
          signing.storePassword=$SIGNING_STORE_PASSWORD
          signing.keyPassword=$SIGNING_KEY_PASSWORD
          EOF

      - name: Ensure Gradle wrapper is executable
        run: chmod +x gradlew

      - name: Validate tag matches app version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          APP_VERSION="$(./gradlew -q printVersionName)"
          if [ "$TAG_VERSION" != "$APP_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match appVersionName $APP_VERSION"
            exit 1
          fi

      - name: Run unit tests
        run: ./gradlew --no-daemon testDebugUnitTest

      - name: Build signed release APK
        run: ./gradlew --no-daemon packageReleaseApk

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: signed-release-apk-${{ github.ref_name }}
          path: app/build/dist/*.apk
          if-no-files-found: error

      - name: Select release notes source
        id: release_notes
        shell: bash
        run: |
          NOTES_FILE="docs/releases/${GITHUB_REF_NAME}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "body_path=$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "generate_notes=false" >> "$GITHUB_OUTPUT"
          else
            echo "body_path=" >> "$GITHUB_OUTPUT"
            echo "generate_notes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: app/build/dist/*.apk
          body_path: ${{ steps.release_notes.outputs.body_path }}
          generate_release_notes: ${{ steps.release_notes.outputs.generate_notes }}

  sync-readme:
    runs-on: ubuntu-latest
    needs: release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update README release metadata
        shell: bash
        run: |
          python - <<'PY'
          import pathlib
          import re

          root = pathlib.Path('.').resolve()
          readme_path = root / 'README.md'
          gradle_path = root / 'app' / 'build.gradle.kts'

          release_tag = '${{ github.ref_name }}'
          gradle_text = gradle_path.read_text(encoding='utf-8')
          version_code_match = re.search(r'val\s+appVersionCode\s*=\s*(\d+)', gradle_text)
          if not version_code_match:
              raise SystemExit('Could not find appVersionCode in app/build.gradle.kts')
          version_code = version_code_match.group(1)

          readme_text = readme_path.read_text(encoding='utf-8')

          def replace_block(text: str, marker: str, replacement: str) -> str:
              pattern = re.compile(
                  rf'(<!-- BEGIN:{marker} -->)(.*?)(<!-- END:{marker} -->)',
                  re.DOTALL,
              )
              if len(pattern.findall(text)) != 1:
                  raise SystemExit(f'Expected exactly one marker block for: {marker}')
              if not pattern.search(text):
                  raise SystemExit(f'Marker block not found: {marker}')
              return pattern.sub(rf'\1\n{replacement}\n\3', text, count=1)

          release_link = f'<a href="https://github.com/impersonal-byte/OvertimeCalculator/releases/tag/{release_tag}">查看 {release_tag}</a>'
          current_version = '\n'.join([
              f'- 当前正式版本：`{release_tag}`',
              f'- 当前版本号：`{version_code}`',
          ])

          updated = replace_block(readme_text, 'current-release-link', release_link)
          updated = replace_block(updated, 'current-version', current_version)

          if updated != readme_text:
              readme_path.write_text(updated, encoding='utf-8')
          PY

      - name: Commit README sync
        shell: bash
        run: |
          if git diff --quiet -- README.md; then
            echo "README already up to date"
            exit 0
          fi

          git add README.md
          git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" \
            commit -m "docs: sync README for ${{ github.ref_name }} [skip ci]"
          git push origin HEAD:main
